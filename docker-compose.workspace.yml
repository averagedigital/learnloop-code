services:
  falkordb:
    image: falkordb/falkordb-server:latest
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  graph-memory:
    build:
      context: .
      dockerfile: memory_service/Dockerfile
    ports:
      - "${GRAPH_MEMORY_PORT:-8008}:8008"
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      GRAPH_MEMORY_PORT: 8008
      GRAPH_EMBEDDING_PROVIDER: "${GRAPH_EMBEDDING_PROVIDER:-auto}"
      GRAPH_EMBEDDING_BASE_URL: "${GRAPH_EMBEDDING_BASE_URL:-}"
      GRAPH_EMBEDDING_MODEL: "${GRAPH_EMBEDDING_MODEL:-}"
      GRAPH_EMBEDDING_DIM: "${GRAPH_EMBEDDING_DIM:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_ADMIN_KEY: "${OPENAI_ADMIN_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GRAPH_OPENAI_API_KEY: "${GRAPH_OPENAI_API_KEY:-}"
      GRAPH_OPENROUTER_API_KEY: "${GRAPH_OPENROUTER_API_KEY:-}"
      GRAPH_YANDEX_AI_STUDIO_API_KEY: "${GRAPH_YANDEX_AI_STUDIO_API_KEY:-}"
      GRAPH_YANDEX_AI_STUDIO_FOLDER_ID: "${GRAPH_YANDEX_AI_STUDIO_FOLDER_ID:-}"
      YANDEX_AI_STUDIO_API_KEY: "${YANDEX_AI_STUDIO_API_KEY:-}"
      YANDEX_AI_STUDIO_FOLDER_ID: "${YANDEX_AI_STUDIO_FOLDER_ID:-}"
      ANONYMIZED_TELEMETRY: "false"
    depends_on:
      falkordb:
        condition: service_healthy

  judge0-db:
    image: postgres:16.2
    env_file: config/judge0.conf
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  judge0-redis:
    image: redis:7.2.4
    env_file: config/judge0.conf
    command: ["bash", "-c", "docker-entrypoint.sh --appendonly no --requirepass \"$$REDIS_PASSWORD\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  judge0-server:
    image: judge0/judge0:1.13.1
    platform: linux/amd64
    privileged: true
    volumes:
      - ./config/judge0.conf:/judge0.conf:ro
    ports:
      - "127.0.0.1:${JUDGE0_PORT:-2358}:2358"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-worker:
    image: judge0/judge0:1.13.1
    platform: linux/amd64
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./config/judge0.conf:/judge0.conf:ro
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

volumes:
  falkordb-data:
  judge0-db-data:
