services:
  falkordb:
    image: falkordb/falkordb-server:latest
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  graph-memory:
    build:
      context: .
      dockerfile: memory_service/Dockerfile
    ports:
      - "${GRAPH_MEMORY_PORT:-8008}:8008"
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      GRAPH_MEMORY_PORT: 8008
      GRAPH_EMBEDDING_PROVIDER: "${GRAPH_EMBEDDING_PROVIDER:-auto}"
      GRAPH_EMBEDDING_BASE_URL: "${GRAPH_EMBEDDING_BASE_URL:-}"
      GRAPH_EMBEDDING_MODEL: "${GRAPH_EMBEDDING_MODEL:-}"
      GRAPH_EMBEDDING_DIM: "${GRAPH_EMBEDDING_DIM:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_ADMIN_KEY: "${OPENAI_ADMIN_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GRAPH_OPENAI_API_KEY: "${GRAPH_OPENAI_API_KEY:-}"
      GRAPH_OPENROUTER_API_KEY: "${GRAPH_OPENROUTER_API_KEY:-}"
      GRAPH_YANDEX_AI_STUDIO_API_KEY: "${GRAPH_YANDEX_AI_STUDIO_API_KEY:-}"
      GRAPH_YANDEX_AI_STUDIO_FOLDER_ID: "${GRAPH_YANDEX_AI_STUDIO_FOLDER_ID:-}"
      YANDEX_AI_STUDIO_API_KEY: "${YANDEX_AI_STUDIO_API_KEY:-}"
      YANDEX_AI_STUDIO_FOLDER_ID: "${YANDEX_AI_STUDIO_FOLDER_ID:-}"
      ANONYMIZED_TELEMETRY: "false"
    depends_on:
      falkordb:
        condition: service_healthy

volumes:
  falkordb-data:
